<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forbidden')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-5">
    <div class="alert alert-danger">
        <h2 class="mb-2">403 - Forbidden</h2>
        <p class="mb-2">You are authenticated but do not have permission to access this page.</p>
        <p class="mb-0" th:if="${message}" th:text="${message}"></p>
    </div>

    <div class="d-flex gap-2">
        <a class="btn btn-primary" th:href="@{/clubs}">Back to clubs</a>
        <a class="btn btn-outline-secondary" th:href="@{/events}">View events</a>
    </div>
</div>
</body>
</html>
