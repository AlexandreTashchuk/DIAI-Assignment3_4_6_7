<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Create Event</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<div th:replace="fragments/layout :: navbar"></div>

<div class="container mt-4">

  <h2>Create Event</h2>

  <form th:action="@{/clubs/{id}/events(id=${clubId})}"
        th:object="${eventForm}"
        method="post">

    <!-- NAME -->
    <div class="mb-3">x
      <label class="form-label">Name</label>
      <input type="text" th:field="*{name}" class="form-control">

      <div class="text-danger"
           th:if="${#fields.hasErrors('name')}"
           th:errors="*{name}">
      </div>
    </div>

    <!-- DATE -->
    <div class="mb-3">
      <label class="form-label">Date</label>
      <input type="date" th:field="*{date}" class="form-control">

      <div class="text-danger"
           th:if="${#fields.hasErrors('date')}"
           th:errors="*{date}">
      </div>
    </div>

    <!-- TYPE -->
    <div class="mb-3">
      <label class="form-label">Type</label>

      <select th:field="*{type}" class="form-select">
        <option value="">Select type</option>

        <option th:each="t : ${types}"
                th:value="${t}"
                th:text="${t}">
        </option>
      </select>

      <div class="text-danger"
           th:if="${#fields.hasErrors('type')}"
           th:errors="*{type}">
      </div>
    </div>

    <!-- LOCATION -->
    <div class="mb-3">
      <label class="form-label">Location</label>
      <input type="text" th:field="*{location}" class="form-control">
    </div>

    <!-- DESCRIPTION -->
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea th:field="*{description}" class="form-control"></textarea>
    </div>

    <button class="btn btn-primary">Create</button>

  </form>

</div>

</body>
</html>
