spring.application.name=novaevents
spring.mvc.hiddenmethod.filter.enabled=true
spring.datasource.url=jdbc:mysql://localhost:3306/novaevents
spring.datasource.username=root
spring.datasource.password=rootpass
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Do not run schema.sql automatically; teacher tests boot with fresh H2 and no tables yet.
spring.sql.init.mode=never

# Base64-encoded HMAC key for JWT signing. Override in production via JWT_SECRET env var.
app.jwt.secret=${JWT_SECRET:VGhpc0lzQVN0cm9uZ0RldmVsb3BtZW50S2V5VGhhdFNob3VsZEJlQ2hhbmdlZA==}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

